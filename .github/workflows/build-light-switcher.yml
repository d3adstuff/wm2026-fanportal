name: Light Switcher APK bauen

on:
  push:
    branches: [claude/android-light-switcher-app-0wrbpj, main]
    paths:
      - "light-switcher-app/**"
      - ".github/workflows/build-light-switcher.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: APK bauen (Debug, signiert mit Debug-Key)
        working-directory: light-switcher-app
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: APK umbenennen
        run: cp light-switcher-app/app/build/outputs/apk/debug/app-debug.apk LightSwitcher.apk

      - name: APK als Download-Artefakt bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: LightSwitcher-apk
          path: LightSwitcher.apk
          retention-days: 30

      - name: APK als Release veröffentlichen (direkter Download-Link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: light-switcher-latest
          name: Light Switcher (latest)
          body: |
            Automatisch gebaute Debug-APK des Light Switcher.
            Direkt auf dem Handy herunterladen und installieren
            (ggf. "Installation aus unbekannten Quellen" erlauben).
          prerelease: true
          files: LightSwitcher.apk
