name: Light Switcher APK bauen

on:
  push:
    branches: [claude/android-light-switcher-app-0wrbpj, main]
    paths:
      - "light-switcher-app/**"
      - ".github/workflows/build-light-switcher.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: APK bauen (Debug, signiert mit Debug-Key)
        working-directory: light-switcher-app
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: LightSwitcher-apk
          path: light-switcher-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
